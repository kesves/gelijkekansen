        { text:"De jeugdarts verwijst je naar de jeugd-ggz", next:"vroege_interventie", stress:0, det:{protective:["earlydetect","therapy"]} },
        { text:"De wachtlijst bij de jeugd-ggz is vier maanden", next:"wachtlijst_jeugd", stress:1, det:{risk:["wait"]} },
      ]
    },
    { id:"sport_beschermend", phase:"Structuur", age:"15 jaar", text:`Voetbal geeft je structuur. Je hebt vrienden, een trainer die je vertrouwt. De stemmen komen en gaan, maar na het sporten zijn ze stiller. Op een dag valt het de trainer op dat je staat te praten tegen iemand die er niet is. Hij belt je moeder. Je moeder belt de huisarts.`, determinants:{risk:[],protective:["support","mentor"]},
      choices:[
        { text:"Naar de huisarts — je moeder gaat mee", next:"huisarts_vroeg", stress:0, det:{protective:["support","gp","earlydetect"]} },
        { text:"Boos worden op de trainer — hij had zich er niet mee moeten bemoeien", next:"adolescentie_kwetsbaar", stress:1, det:{risk:["isolation"]} },
      ]
    },
    { id:"vroege_interventie", phase:"Vroege herkenning", age:"15 jaar", text:`De psycholoog praat met je en met je moeder. De conclusie: wat je ervaart is serieus, maar er is hulp mogelijk. Er is een plan: elke twee weken een gesprek, leren omgaan met stress, en uitleg over wat er in je hoofd gebeurt. Voor het eerst begrijp je dat de stemmen geen teken zijn dat je 'gek' bent, maar dat je brein overbelast is.`, determinants:{risk:[],protective:["earlydetect","therapy","continuity"]},
      choices:[
        { text:"De begeleiding volhouden — het helpt", next:"stabilisatie_vroeg", stress:0, det:{protective:["continuity","therapy"]} },
        { text:"Stoppen na een half jaar — het gaat beter", next:"adolescentie_kwetsbaar", stress:1, det:{risk:["residual"]} },
      ]
    },
    { id:"adolescentie_kwetsbaar", phase:"Kwetsbaar", age:"17 jaar", text:`Je bent 17. De stemmen zijn er niet altijd, maar als ze komen, zijn ze hevig. Je rookt cannabis — dat helpt even. Je examens naderen. De stress stapelt zich op. Je slaapt steeds minder. Op een nacht ben je ervan overtuigd dat er iemand in je kamer staat. Er is niemand.`, determinants:{risk:["substance"],protective:[]},
      choices:[
        { text:"Cannabis stoppen — een vriend zegt dat het de stemmen erger maakt", next:"cannabis_stop", stress:0, det:{protective:["support"]} },
        { text:"Meer cannabis — het is de enige manier om te slapen", next:"cannabis_escalatie", stress:2, det:{risk:["substance"]} },
        { text:"De crisislijn bellen (de stemmen schreeuwen)", next:"crisis_hulp", stress:1, det:{protective:["crisis_plan"]} },
      ]
    },
    { id:"huisarts_vroeg", phase:"De huisarts", age:"16 jaar", text:`De huisarts luistert goed. "Stemmen horen op jouw leeftijd kan wijzen op stress, maar het kan ook iets anders zijn. Ik verwijs je door naar een vroege-psychoseteam." De wachttijd: drie weken. Dat is snel — je huisarts heeft gebeld om het te bespoedigen.`, determinants:{risk:[],protective:["gp","earlydetect"]},
      choices:[
        { text:"Naar het vroege-psychoseteam", next:"vroege_interventie", stress:0, det:{protective:["earlydetect","therapy"]} },
      ]
    },
    { id:"huisarts_laat", phase:"De huisarts (laat)", age:"16 jaar", text:`De huisarts schrikt van wat je vertelt. "Dit is serieus. Ik verwijs je met spoed naar de jeugd-ggz." Maar je bent al twee jaar uit beeld geweest. De achterstand is groot. De jeugd-ggz-wachtlijst: tien weken.`, determinants:{risk:["wait"],protective:["gp"]},
      choices:[
        { text:"Wachten op de jeugd-ggz", next:"wachtlijst_jeugd", stress:2, det:{risk:["wait"]} },
        { text:"Je moeder belt elke dag — uiteindelijk is er plek", next:"vroege_interventie", stress:1, det:{protective:["support"]} },
      ]
    },
    { id:"wachtlijst_jeugd", phase:"Wachten", age:"16 jaar", text:`Weken gaan voorbij. De stemmen worden commando's: "Spring." "Ren." Je gaat niet meer naar school. De leerplichtambtenaar stuurt een brief. Je moeder is radeloos. Na acht weken is er eindelijk een intake. De psycholoog zegt: "We hadden je eerder willen zien."`, determinants:{risk:["wait","dropout"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — WACHTLIJSTSPIRAAL: Acht weken wachten bij een adolescent met actieve psychotische symptomen. In die acht weken is de psychopathologie geëscaleerd, is schooluitval een feit, en zijn de kansen op vroege interventie verkleind.`,
      choices:[
        { text:"De behandeling starten", next:"behandeling_jeugdggz", stress:0, det:{protective:["therapy","continuity"]} },
      ]
    },
    { id:"crisis_onbehandeld", phase:"Crisis", age:"17 jaar", text:`Op een nacht ren je het huis uit, overtuigd dat het huis in brand staat. De buren bellen 112. De politie vindt je in het park, in je pyjama, pratend tegen de bomen. Ze zijn vriendelijk, maar weten niet wat ze moeten doen. Je wordt naar de SEH gebracht. Daar wacht je vijf uur op een psychiater.`, determinants:{risk:["police"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — ONBEHANDELDE PSYCHOSE: Twee jaar zonder hulp heeft geleid tot een acute psychotische crisis. De politie is nu de eerste lijn. Dit is precies het patroon achter de 149.827 E33-meldingen in 2024.`,
      choices:[
        { text:"Opname op de gesloten afdeling", next:"opname_acuut", stress:3, det:{risk:["separation"]} },
        { text:"De crisisdienst biedt een alternatief: Intensive Home Treatment", next:"iht_thuis", stress:1, det:{protective:["continuity"]} },
      ]
    },
    { id:"cannabis_stop", phase:"Stoppen", age:"17 jaar", text:`Je vriend Karim zegt: "Wiet maakt het erger, man. Mijn neef had hetzelfde." Je stopt. De eerste week is verschrikkelijk — de stemmen zijn luider dan ooit. Maar Karim is er. Hij slaapt bij je als het erg is. Na drie weken zijn de stemmen zachter. Je haalt je examens — nét.`, determinants:{risk:[],protective:["support"]},
      choices:[
        { text:"Naar de huisarts voor verwijzing ggz — het is niet over", next:"huisarts_vroeg", stress:0, det:{protective:["gp","earlydetect"]} },
        { text:"Het gaat beter — geen hulp nodig", next:"18_zonder_hulp", stress:1, det:{risk:["residual"]} },
      ]
    },
    { id:"cannabis_escalatie", phase:"Escalatie", age:"18 jaar", text:`De cannabis werkt niet meer zoals vroeger. Je combineert het met alcohol. De stemmen worden filmisch — je ziet dingen die er niet zijn. Op een avond in de stad raak je in paniek en sla je een ruit in. De politie pakt je op. In de cel brullen de stemmen.`, determinants:{risk:["substance","police"],protective:[]},
      choices:[
        { text:"De dienstdoende GGD-arts herkent psychose en belt de crisisdienst", next:"crisis_hulp", stress:2, det:{protective:["earlydetect"]} },
        { text:"Je wordt de volgende ochtend vrijgelaten zonder verwijzing", next:"18_zonder_hulp", stress:3, det:{risk:["noafterzorg","police"]} },
      ]
    },
    { id:"crisis_hulp", phase:"Crisishulp", age:"18 jaar", text:`De crisisdienst komt. Een verpleegkundig specialist en een arts. Ze zijn rustig. Ze leggen uit wat er gebeurt. "De stemmen zijn echt voor jou, maar ze komen van je brein. We kunnen helpen." Ze bieden medicatie aan die de stemmen zachter kan maken. En een keuze: opname of intensieve thuisbehandeling.`, determinants:{risk:[],protective:["earlydetect"]},
      choices:[
        { text:"Opname — je moeder kan het thuis niet meer aan", next:"opname_acuut", stress:2, det:{risk:[]} },
        { text:"Intensive Home Treatment — je wilt thuis blijven", next:"iht_thuis", stress:0, det:{protective:["continuity"]} },
        { text:"Een crisisplan maken samen met je moeder", next:"crisisplan", stress:0, det:{protective:["crisis_plan","support"]} },
      ]
    },
    { id:"stabilisatie_vroeg", phase:"Stabilisatie", age:"17 jaar", text:`De begeleiding werkt. Je leert signalen herkennen: als je minder slaapt, worden de stemmen sterker. Stress is een trigger. De psycholoog maakt samen met jou een signaleringsplan. Je moeder leert wat ze kan doen. Op school weten ze ervan — de vertrouwensdocent houdt een oogje in het zeil. Je examens zijn over drie maanden.`, determinants:{risk:[],protective:["therapy","continuity","crisis_plan","support","school"]},
      choices:[
        { text:"De examens halen en doorgaan naar het mbo", next:"18_met_plan", stress:0, det:{protective:["work","continuity"]} },
        { text:"De stress van de examens triggert een terugval", next:"terugval_beschermd", stress:1, det:{risk:["residual"]} },
      ]
    },
    { id:"behandeling_jeugdggz", phase:"Behandeling", age:"17 jaar", text:`De jeugd-ggz start een behandeltraject: gesprekken, medicatie, en begeleiding op school. Het helpt. De stemmen verdwijnen niet maar je leert ermee omgaan. Dan naderen de examens — en daarna je 18e verjaardag.`, determinants:{risk:[],protective:["therapy","medication"]},
      choices:[
        { text:"De behandelaar bespreekt de overgang naar volwassenen-ggz ruim van tevoren", next:"18_met_plan", stress:0, det:{protective:["continuity"]} },
        { text:"Op je 18e stopt de jeugd-ggz — de volwassenen-ggz 'neemt het over'", next:"18_zonder_plan", stress:2, det:{risk:["transition"]} },
      ]
    },
    { id:"18_met_plan", phase:"Transitie met plan", age:"18 jaar", text:`Je behandelaar heeft het goed voorbereid. Drie maanden voor je 18e verjaardag heb je al een kennismakingsgesprek gehad met het volwassenen-team. Je behandelaar draagt over aan een nieuwe begeleider — maar ze doen het samen, in een overgangsperiode van zes weken. Je voelt je niet losgelaten. Je start op het mbo. Het FACT-team kent je.`, determinants:{risk:[],protective:["continuity","factteam","work"]}, systemText:`✅ BESCHERMEND MOMENT: Een warme overdracht van jeugd- naar volwassenen-ggz, met overlappende zorg. Dit is wat de richtlijnen aanbevelen — maar in de praktijk zelden gebeurt.`,
      choices:[
        { text:"Doorgaan met de behandeling — het gaat redelijk", next:"einde_vroeg_herstel", stress:0, det:{protective:["continuity"]} },
        { text:"Op het mbo wordt het moeilijk — nieuwe stress, nieuwe triggers", next:"terugval_beschermd", stress:1, det:{risk:["residual"]} },
      ]
    },
    { id:"18_zonder_plan", phase:"De knip op 18", age:"18 jaar", text:`Op je 18e verjaardag — gefeliciteerd — verlies je in één klap je behandelaar, je jeugdhulpverlener en je recht op jeugdzorg. De volwassenen-ggz heeft je "overgenomen" maar de eerste afspraak is pas over twee maanden. Je nieuwe behandelaar kent je dossier niet. Je moet je hele verhaal opnieuw vertellen. Je medicatie raakt op en niemand voelt zich verantwoordelijk om die te verlengen.`, determinants:{risk:["transition","fragmentation","noafterzorg"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — TRANSITIEBREUK (18 JAAR): De overgang van jeugd- naar volwassenen-ggz is een van de best gedocumenteerde systeemfalen. Alle behandelrelaties worden verbroken op een willekeurig moment (verjaardag) in plaats van op een klinisch verantwoord moment.`,
      choices:[
        { text:"De huisarts springt bij en overbrugt de wachtperiode", next:"huisarts_overbrugt", stress:1, det:{protective:["gp","continuity"]} },
        { text:"Zonder medicatie en zonder begeleider val je terug", next:"opname_acuut", stress:3, det:{risk:["noafterzorg"]} },
        { text:"Je moeder belt de crisislijn als het misgaat", next:"crisis_hulp", stress:2, det:{protective:["support"]} },
      ]
    },
    { id:"18_zonder_hulp", phase:"Achttien", age:"18 jaar", text:`Je bent 18, zonder diagnose, zonder behandeling. De stemmen zijn je metgezel geworden — soms rustig, soms dreigend. Je werkt als vakkenvuller maar je mist steeds diensten. De manager zegt: "Nog één keer en je bent ontslagen." Op een avond word je op straat aangesproken door een outreachend werker van het OGGZ-team die je al een paar keer in de wijk heeft gezien.`, determinants:{risk:["isolation","noafterzorg"],protective:[]},
      choices:[
        { text:"Met de outreachend werker praten", next:"bemoeizorg_contact", stress:0, det:{protective:["bemoeizorg","earlydetect"]} },
        { text:"Doorlopen — je vertrouwt niemand", next:"crisis_onbehandeld", stress:2, det:{risk:["isolation"]} },
      ]
    },
    { id:"bemoeizorg_contact", phase:"Bemoeizorg", age:"19 jaar", text:`De outreachend werker heet Thomas. Hij dringt niet aan. Hij komt elke week langs. Soms drink je samen koffie bij de snackbar. Na drie maanden vertel je hem over de stemmen. Thomas zegt: "Ik ken een psychiater die naar je wil luisteren. Zal ik meegaan?" Hij meent het.`, determinants:{risk:[],protective:["bemoeizorg","mentor","continuity"]}, systemText:`✅ BESCHERMEND MOMENT: Bemoeizorg — assertieve outreach naar mensen die de reguliere zorg niet bereiken. Dit type zorg is op dit moment niet overal beschikbaar en niet structureel vergoed.`,
      choices:[
        { text:"Meegaan met Thomas naar de psychiater", next:"einde_via_bemoeizorg", stress:0, det:{protective:["therapy","factteam"]} },
        { text:"Nog niet — maar Thomas blijft langskomen", next:"bemoeizorg_langzaam", stress:0, det:{protective:["bemoeizorg","continuity"]} },
      ]
    },
    { id:"huisarts_overbrugt", phase:"De huisarts als vangnet", age:"18 jaar", text:`Huisarts De Boer kent je al jaren. Ze zorgt dat je medicatie doorloopt, belt wekelijks, en stuurt een dringend verzoek naar de ggz om de wachttijd te verkorten. Na zes weken heb je een intake bij het ambulante team. Het is niet ideaal — er is een gat gevallen — maar het had veel erger gekund.`, determinants:{risk:[],protective:["gp","continuity"]},
      choices:[
        { text:"Het FACT-team neemt het over", next:"einde_vroeg_herstel", stress:0, det:{protective:["factteam","continuity"]} },
      ]
    },
    { id:"opname_acuut", phase:"Opname", age:"19 jaar", text:`De gesloten afdeling. Piepende deuren. Andere patiënten die schreeuwen of staren. Je krijgt medicatie. De bijwerkingen zijn fors: je voelt je verdoofd en bent de hele dag moe. Na drie weken worden de stemmen zachter. Na vijf weken mag je naar huis. De behandelaar zegt: "We melden je aan bij een ambulant team." Wachtlijst: drie maanden.`, determinants:{risk:["noafterzorg","wait"],protective:["medication"]}, systemText:`⚠️ SYSTEEMMOMENT — DRAAIDEUR: Ontslagen na vijf weken, maar drie maanden wachten op ambulante zorg. Dit gat is waar terugval ontstaat.`,
      choices:[
        { text:"Wachten op het FACT-team — je moeder is er", next:"wacht_thuis", stress:2, det:{protective:["support"],risk:["wait"]} },
        { text:"Je moeder vraagt een ervaringsdeskundige als overbrugging", next:"peer_support", stress:0, det:{protective:["peer","support"]} },
        { text:"De medicatie bijwerkingen zijn ondraaglijk — je stopt", next:"terugval_snel", stress:3, det:{risk:["noafterzorg"]} },
      ]
    },
    { id:"iht_thuis", phase:"Intensive Home Treatment", age:"18 jaar", text:`Het IHT-team komt elke dag bij je thuis. Een verpleegkundige, soms een psychiater. Ze helpen met medicatie, praten met je moeder, zorgen dat je eet en slaapt. Na twee weken worden de bezoeken om de dag, dan twee keer per week. Na zes weken word je overgedragen aan het reguliere FACT-team — en de overdracht gaat soepel want het is dezelfde organisatie.`, determinants:{risk:[],protective:["continuity","medication","factteam","support"]}, systemText:`✅ BESCHERMEND MOMENT: IHT als alternatief voor opname houdt de persoon in de eigen omgeving en voorkomt de traumatiserende ervaring van een gesloten afdeling. De continuïteit met het FACT-team doorbreekt de draaideur.`,
      choices:[
        { text:"Verder met het FACT-team — het gaat langzaam beter", next:"einde_vroeg_herstel", stress:0, det:{protective:["factteam","continuity"]} },
      ]
    },
    { id:"crisisplan", phase:"Het crisisplan", age:"18 jaar", text:`Samen met de crisisverpleegkundige en je moeder maak je een plan: wat zijn de signalen dat het misgaat? Wie bel je dan? Wat helpt? Op een kaartje in je portemonnee staat: "Als ik in de war ben: bel mijn moeder (06-...) of het FACT-team (020-...)." Het kaartje zal je twee keer redden in het komende jaar.`, determinants:{risk:[],protective:["crisis_plan","support","continuity"]},
      choices:[
        { text:"Het crisisplan werkt — je voorkomt twee opnames", next:"einde_vroeg_herstel", stress:0, det:{protective:["crisis_plan"]} },
        { text:"De derde keer is het niet genoeg — je hebt meer nodig", next:"opname_acuut", stress:2, det:{risk:[]} },
      ]
    },
    { id:"peer_support", phase:"Ervaringsdeskundige", age:"19 jaar", text:`De ervaringsdeskundige heet Fatih. Hij is 28 en heeft zelf psychoses gehad. Hij begrijpt wat je doormaakt op een manier die je moeder en de artsen niet kunnen. "De bijwerkingen? Ja, die zijn klote. Maar het alternatief is erger. Vertel de psychiater welke bijwerkingen je hebt — er zijn andere medicijnen." Fatih gaat mee naar de apotheek, belt de huisarts, en is er als het 's nachts moeilijk is.`, determinants:{risk:[],protective:["peer","medication","continuity"]}, systemText:`✅ BESCHERMEND MOMENT: Ervaringsdeskundigheid overbrugt het gat tussen het systeem en de persoon. Fatih spreekt de taal van het systeem én de taal van de ervaring.`,
      choices:[
        { text:"Met Fatih's hulp wacht je het FACT-team af — het lukt", next:"einde_vroeg_herstel", stress:0, det:{protective:["peer","factteam"]} },
      ]
    },
    { id:"wacht_thuis", phase:"Wachten thuis", age:"19 jaar", text:`Je wacht thuis op het FACT-team. Je moeder is je dagelijks houvast. Maar ze is moe. Na twee maanden heeft ze zelf hulp nodig — de huisarts verwijst haar naar een mantelzorgsteunpunt. De weken kruipen voorbij. De medicatie werkt maar je voelt je leeg. Je zit op je kamer. Je oude vrienden bellen niet meer.`, determinants:{risk:["isolation","wait"],protective:["support","medication"]},
      choices:[
        { text:"Het FACT-team start — eindelijk", next:"einde_fact_start", stress:1, det:{protective:["factteam"]} },
        { text:"De eenzaamheid is ondraaglijk — je stopt met medicatie om iets te voelen", next:"terugval_snel", stress:3, det:{risk:["noafterzorg"]} },
      ]
    },
    { id:"terugval_snel", phase:"Terugval", age:"19 jaar", text:`Zonder medicatie komen de stemmen terug binnen twee weken. Harder, bozer. Je moeder belt de crisislijn. Weer een opname. De verpleegkundige zegt: "Je was hier vorige maand ook." De schaamte brandt. Je bent 19 en dit is je tweede opname. Je examens heb je niet gehaald. Je baan ben je kwijt.`, determinants:{risk:["noafterzorg","kindling"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — DRAAIDEUR ACTIEF: Tweede opname in twee maanden. Elke cyclus kost iets: school, werk, zelfvertrouwen. De accumulatieve schade begint.`,
      choices:[
        { text:"Na ontslag zoekt een outreachend werker je op", next:"bemoeizorg_contact", stress:1, det:{protective:["bemoeizorg"]} },
        { text:"Na ontslag val je weer uit beeld", next:"einde_vastgelopen", stress:3, det:{risk:["noafterzorg","isolation"]} },
      ]
    },
    { id:"terugval_beschermd", phase:"Terugval (beschermd)", age:"18 jaar", text:`De stress van het mbo triggert een terugval. De stemmen worden luider. Maar dit keer heb je een plan: je belt je behandelaar. Die schakelt het IHT-team in. Binnen 24 uur is er thuisbehandeling. De terugval duurt twee weken in plaats van twee maanden. Geen opname. Geen politie. Geen E33-melding.`, determinants:{risk:["residual"],protective:["crisis_plan","continuity","factteam"]}, systemText:`✅ BESCHERMEND MOMENT: Het verschil tussen een terugval mét en zonder vangnetten. Dezelfde persoon, dezelfde stoornis — maar een radicaal andere uitkomst door behandelcontinuïteit, een crisisplan en snelle interventie.`,
      choices:[
        { text:"Herstellen en doorgaan", next:"einde_vroeg_herstel", stress:0, det:{protective:["continuity"]} },
      ]
    },
    { id:"bemoeizorg_langzaam", phase:"Geduld", age:"20 jaar", text:`Thomas komt een jaar lang elke week. Soms praten jullie, soms niet. Op een dag in november zeg je: "Ik denk dat ik hulp nodig heb." Thomas glimlacht. "Ik weet iemand."`, determinants:{risk:[],protective:["bemoeizorg","continuity","mentor"]},
      choices:[
        { text:"Verder →", next:"einde_via_bemoeizorg", stress:0, det:{protective:["therapy","factteam"]} },
      ]
    },
    // === ENDINGS ===
    { id:"einde_vroeg_herstel", phase:"Herstel", age:"20 jaar", text:`Je bent 20. Je hebt een diagnose, een behandelaar, medicatie die werkt, en een begin van een nieuw leven. Het is niet makkelijk — de stemmen zijn er soms nog, de bijwerkingen van de medicatie, de gemiste examens. Maar je hebt een basis. Je vraagt je af: wat als ik geen moeder had gehad die bleef bellen? Geen Henk op school? Geen Fatih als ervaringsdeskundige? Geen Thomas in de wijk? Niet iedereen heeft dat.`, isEnding:true, endingType:"good", determinants:{risk:[],protective:[]} },
    { id:"einde_fact_start", phase:"Een begin", age:"20 jaar", text:`Het FACT-team is er. Marloes is je vaste begeleider. Ze helpt met medicatie, dagstructuur, een aanvraag voor dagbesteding. Het gaat langzaam. Maar het gaat. Je bent bijna een jaar kwijt aan wachtlijsten en systeembreuken. Dat jaar komt niet terug.`, isEnding:true, endingType:"mixed", determinants:{risk:[],protective:[]} },
    { id:"einde_via_bemoeizorg", phase:"Via de achterdeur", age:"20 jaar", text:`Via Thomas' bemoeizorg kom je uiteindelijk in zorg. Het heeft twee jaar langer geduurd dan nodig was. Twee jaar van stemmen, angst, isolatie, en bijna-crises. Maar Thomas gaf niet op. De psychiater waar hij je mee naartoe neemt luistert, diagnosticeert, en start behandeling. Je bent 20 en je leven begint voor de tweede keer. Je eerste leven — dat van school, vrienden, normaal zijn — is voorbij. Dit is een nieuw leven.`, isEnding:true, endingType:"mixed", determinants:{risk:[],protective:[]} },
    { id:"einde_vastgelopen", phase:"Vastgelopen", age:"21 jaar", text:`Je bent 21. Drie opnames, geen opleiding, geen werk. De stemmen zijn je constante metgezel. Je woont wisselend bij je moeder en in de opvang. Er zijn E33-meldingen, een Wvggz-melding, een dossier bij het Zorg- en Veiligheidshuis. Er wordt over je vergaderd door mensen die je niet kent. Het systeem noemt je een 'complexe casus'. Jij noemt jezelf niks meer.`, isEnding:true, endingType:"stuck", determinants:{risk:[],protective:[]} },
  ],
  sara: [
    { id:"start", phase:"De eerste episode", age:"16 jaar", text:`Je bent 16. Sinds een paar maanden voel je je anders — zwaar, leeg, alsof alles achter glas zit. Je moeder zegt: "Het is de puberteit." De huisarts zegt: "Probeer eens te sporten." Je lerares ziet dat je altijd moe bent en vraagt of alles goed gaat. Je zegt: "Ja hoor."`, determinants:{risk:[],protective:[]},
      choices:[
        { text:"Toch de lerares in vertrouwen nemen", next:"lerares_sara", stress:0, det:{protective:["school","mentor","earlydetect"]} },

    { id:"einde_sara_gemengd", phase:"Beter laat dan nooit", age:"29 jaar", text:`Je bent 29. Na dertien jaar — vanaf de eerste tekenen op je 16e tot nu — heb je eindelijk een behandeling die werkt. Je hebt veel verloren: jaren, kansen, relaties. De WIA-aanvraag loopt. Je bent bezig met een re-integratietraject. Het gaat langzaam. Maar het gaat. De schade van de wachtlijsten, de verkeerde behandelingen, de restsymptomen die niet werden aangepakt — die schade is onomkeerbaar.`, isEnding:true, endingType:"mixed", determinants:{risk:[],protective:[]} },

    { id:"herstel_laat_youssef", phase:"Herstel (laat)", age:"25 jaar", text:`Het FACT-team helpt. De behandelaar vindt de juiste medicatie-instelling. De sociaalpsychiatrisch verpleegkundige helpt met de schulden — een MSNP-traject. De maatschappelijk werker helpt met het hervatten van een opleiding. Het gaat. Maar de verloren jaren — de onbehandelde manies, de schulden, de verbroken relaties — die horen er nu bij.`, determinants:{risk:[],protective:["factteam","medication","continuity"]},

      ]
    },
    { id:"isolatie_youssef", phase:"Isolatie", age:"25 jaar", text:`De schaamte van de manische episodes verlamt je. Je trekt je terug. De medicatie neem je nog wel, maar je gaat niet naar het FACT-team. De dagen zijn leeg. De depressieve kant van de bipolaire stoornis domineert — je bent drie keer langer depressief dan (hypo)manisch. Niemand ziet het, want je maakt geen scènes meer. Je bent onzichtbaar.`, determinants:{risk:["isolation","stigma"],protective:["medication"]},
      choices:[
        { text:"Een bemoeizorgwerker vindt je via een signaal van de buren", next:"bemoeizorg_youssef", stress:0, det:{protective:["bemoeizorg"]} },
        { text:"Je blijft onzichtbaar", next:"einde_youssef_vastgelopen", stress:2, det:{risk:["isolation"]} },
      ]
    },
    { id:"bemoeizorg_youssef", phase:"Bemoeizorg", age:"26 jaar", text:`De bemoeizorgwerker dringt niet aan. Ze komt langs, praat, luistert. Na twee maanden vertrouw je haar genoeg om te vertellen hoe het écht gaat. Ze schakelt het FACT-team opnieuw in. Dit keer met meer structuur, meer contact, en een ervaringsdeskundige.`, determinants:{risk:[],protective:["bemoeizorg","factteam","peer"]},
      choices:[
        { text:"Verder →", next:"einde_youssef_gemengd", stress:0, det:{protective:["continuity"]} },
      ]
    },
    // === ENDINGS YOUSSEF ===
    { id:"einde_youssef_goed", phase:"Balans", age:"27 jaar", text:`Je bent 27. Stabiel op medicatie. Een studie. Een relatie. De bipolaire stoornis is er — het is een chronische aandoening. Maar je kent hem. Je hebt een crisisplan, een psychiater, en Samira op speed-dial. Je denkt soms: als mijn moeder niet had gebeld, als de huisarts niet had doorverwezen, als niemand had gevraagd naar die euforische weken — dan was dit verhaal heel anders afgelopen.`, isEnding:true, endingType:"good", determinants:{risk:[],protective:[]} },
    { id:"einde_youssef_gemengd", phase:"Opnieuw beginnen", age:"27 jaar", text:`Je bent 27 en begint opnieuw. Met schulden, een beschadigde CV, en herinneringen aan dingen die je in de manie hebt gedaan. Maar ook: met de juiste diagnose, de juiste medicatie, en mensen die je steunen. Het had vijf jaar eerder gekund. Elke maand diagnostische vertraging heeft je iets gekost dat niet terugkomt.`, isEnding:true, endingType:"mixed", determinants:{risk:[],protective:[]} },
    { id:"einde_youssef_vastgelopen", phase:"Onzichtbaar", age:"28 jaar", text:`Je bent 28. De medicatie houdt de manies in bedwang, maar de depressie is er altijd. Je leeft in isolatie. De schulden groeien. Je hebt geen werk, geen opleiding, geen sociaal netwerk. De ggz ziet je eens per drie maanden voor een controle. Niemand vraagt hoe het écht gaat. De bipolaire stoornis heeft je niet gedood — maar het heeft je leven op pauze gezet.`, isEnding:true, endingType:"stuck", determinants:{risk:[],protective:[]} },
  ],
  naomi: [
    { id:"start", phase:"Vier jaar oud", age:"4 jaar", text:`Je woont bij je moeder en haar vriend. De vriend schreeuwt 's nachts. Soms slaat hij. Je moeder huilt veel. Je slaapkamer is koud — het raam is kapot. De juf op de kleuterschool ziet blauwe plekken op je armen. Ze twijfelt. Ze weet niet of ze Veilig Thuis moet bellen.`, determinants:{risk:["ace"],protective:[]},
      choices:[
        { text:"De juf belt Veilig Thuis", next:"veilig_thuis", stress:0, det:{protective:["earlydetect"]} },

    { id:"veilig_thuis", phase:"Veilig Thuis", age:"4 jaar", text:`Veilig Thuis doet onderzoek. Het duurt drie maanden. In die drie maanden gaat het geweld door. Uiteindelijk: ondertoezichtstelling en uithuisplaatsing. Je komt in een pleeggezin. De pleegmoeder is lief. Maar je vertrouwt niemand. Je schreeuwt 's nachts. Je plast in bed. De pleegouders zijn geschokt door je gedrag maar ze geven niet op.`, determinants:{risk:["ace"],protective:["attachment"]},
      choices:[

      ]
    },
    { id:"geen_melding", phase:"Geen melding", age:"5 jaar", text:`Het geweld gaat door. Een jaar later komt je moeder met een gebroken arm op de SEH. De artsen melden bij Veilig Thuis. Nu pas wordt er ingegrepen. Je bent 5 en je hebt twee jaar geweld meegemaakt. De schade aan je hechtingssysteem, je stressregulatie en je basisvertrouwen in de wereld is al aanzienlijk.`, determinants:{risk:["ace"],protective:[]},
      choices:[

    { id:"politie_kind", phase:"De politie", age:"4 jaar", text:`De politie komt. De vriend van je moeder wordt meegenomen. Je moeder is in shock. Jeugdzorg wordt ingeschakeld. Er volgt een ondertoezichtstelling, maar je mag bij je moeder blijven — onder voorwaarde dat ze hulp accepteert.`, determinants:{risk:["ace"],protective:["earlydetect"]},
      choices:[
        { text:"Je moeder accepteert hulp — jullie krijgen intensieve gezinsbegeleiding", next:"moeder_hulp", stress:0, det:{protective:["support","attachment","therapy"]} },
        { text:"Je moeder keert terug naar de partner — het geweld herhaalt zich", next:"geen_melding", stress:3, det:{risk:["ace","hertrauma"]} },
      ]
    },
    { id:"stabiel_pleeggezin", phase:"Het pleeggezin", age:"6 jaar", text:`Het pleeggezin van Karin en Frank geeft je wat je nodig hebt: voorspelbaarheid, warmte, geduld. De eerste twee jaar zijn moeilijk — je test constant of ze je wegsturen. Ze sturen je niet weg. Langzaam leer je dat deze volwassenen blijven. De gedragsproblemen nemen af. De nachtmerries worden minder. Op school gaat het beter.`, determinants:{risk:[],protective:["attachment","continuity","support"]},
      choices:[
        { text:"Op de basisschool krijg je extra ondersteuning van de schoolpsycholoog", next:"school_steun_naomi", stress:0, det:{protective:["school","therapy","earlydetect"]} },
        { text:"Op het voortgezet onderwijs wordt het moeilijker — puberteit + trauma", next:"adolescentie_naomi", stress:1, det:{risk:["residual"]} },
      ]
    },
    { id:"wisselende_plaatsingen", phase:"Wisselende pleeggezinnen", age:"6–10 jaar", text:`Drie pleeggezinnen in vier jaar. Elk pleeggezin heeft goede bedoelingen, maar jouw gedrag — de woedeaanvallen, het wantrouwen, het bedplassen, de nachtmerries — is te zwaar. Elke breuk bevestigt je diepste overtuiging: volwassenen gaan weg. Je leert om niet te hechten. Op je tiende kom je in een residentiële jeugdzorginstelling.`, determinants:{risk:["hertrauma","ace","isolation"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — WISSELENDE PLAATSINGEN: Elke afgebroken plaatsing is een hertraumatisering die het oorspronkelijke hechtingstrauma versterkt. Het systeem dat bedoeld is om te beschermen, brengt opnieuw schade toe.`,
      choices:[
        { text:"In de instelling is een groepsleider die je vertrouwt", next:"mentor_instelling", stress:0, det:{protective:["mentor","attachment"]} },
        { text:"In de instelling leer je overleven — niet herstellen", next:"overleven_instelling", stress:2, det:{risk:["isolation","hertrauma"]} },
      ]
    },
    { id:"moeder_hulp", phase:"Gezinshulp", age:"5 jaar", text:`De gezinscoach komt drie keer per week. Je moeder leert wat veilig ouderschap is. Ze krijgt zelf therapie voor haar trauma's. Het gaat langzaam, maar jullie blijven samen. De relatie met je moeder wordt langzaam beter. Je leert dat je moeder je niet opzettelijk heeft blootgesteld aan geweld — ze kon zelf niet weg.`, determinants:{risk:["ace"],protective:["support","attachment","therapy"]}, systemText:`✅ BESCHERMEND MOMENT: Gezinshulp die het hele systeem adresseert — kind én ouder — voorkomt uithuisplaatsing en beschermt de hechtingsrelatie.`,
      choices:[
        { text:"Op de basisschool merk je dat je 'anders' bent dan andere kinderen", next:"school_steun_naomi", stress:0, det:{protective:["school"]} },

    { id:"mentor_instelling", phase:"De mentor", age:"11 jaar", text:`Groepsleider Lisa is anders. Ze wordt niet boos als je schreeuwt. Ze zet je niet buiten de deur als je spullen kapotmaakt. Ze zegt: "Je mag boos zijn. Je hebt reden om boos te zijn. Maar je hoeft niet alles kapot te maken." Lisa is er een jaar. Het is het langste dat een volwassene voor je is gebleven. Als Lisa vertrekt, huil je voor het eerst in jaren.`, determinants:{risk:[],protective:["mentor","attachment"]},
      choices:[
        { text:"Lisa's opvolger is ook goed — de instelling investeert in continuïteit", next:"school_steun_naomi", stress:0, det:{protective:["continuity"]} },
        { text:"Lisa's opvolger is de vijfde in twee jaar — je haakt af", next:"overleven_instelling", stress:2, det:{risk:["hertrauma"]} },
      ]
    },
    { id:"overleven_instelling", phase:"Overleven", age:"12 jaar", text:`In de instelling leer je de regels: niet te veel laten zien, niet te veel voelen, niet hechten. Je bent 12 en je bent al een veteraan van het systeem. De andere kinderen hebben soortgelijke verhalen. Sommigen worden je vrienden — of wat daarvoor doorgaat. Op een nacht laat een oudere jongen in de instelling je kennismaken met alcohol.`, determinants:{risk:["isolation","substance","hertrauma"],protective:[]},
      choices:[
        { text:"Een behandelaar signaleert je gedrag en start traumabehandeling", next:"trauma_vroeg_naomi", stress:0, det:{protective:["therapy","earlydetect"]} },
        { text:"Niemand signaleert iets — je bent 'lastig maar functionerend'", next:"adolescentie_naomi_zwaar", stress:2, det:{risk:["isolation"]} },
      ]
    },
    { id:"school_steun_naomi", phase:"School", age:"12 jaar", text:`De schoolpsycholoog ziet dat je moeite hebt met concentratie en emotieregulatie. Ze doet geen IQ-test en plakt geen label — ze biedt een veilige plek. Eén keer per week mag je bij haar zitten. Soms praat je, soms niet. Ze dringt niet aan. Na een jaar vertel je haar over de nachtmerries.`, determinants:{risk:[],protective:["school","mentor","earlydetect"]},
      choices:[
        { text:"De schoolpsycholoog verwijst je voor traumabehandeling", next:"trauma_vroeg_naomi", stress:0, det:{protective:["therapy","earlydetect"]} },
        { text:"Je gaat naar het voortgezet onderwijs — de schoolpsycholoog is er niet meer", next:"adolescentie_naomi", stress:1, det:{risk:["fragmentation"]} },
      ]
    },
    { id:"trauma_vroeg_naomi", phase:"Traumabehandeling", age:"14 jaar", text:`De therapeut start traumabehandeling. Het is zwaar. Je moet terug naar de herinneringen die je jarenlang hebt weggestopt. Soms is het erger voordat het beter wordt. Maar na een aantal maanden zijn de nachtmerries minder. De paniek komt minder vaak. Je leert dat je reacties normaal zijn — normale reacties op abnormale situaties.`, determinants:{risk:[],protective:["therapy","continuity"]}, systemText:`✅ BESCHERMEND MOMENT: Vroege traumabehandeling — vóór het 18e jaar — kan het ontwikkeltraject fundamenteel bijsturen. De kans op langdurige problematiek vermindert aanzienlijk.`,
      choices:[
        { text:"Met een betere basis de adolescentie in", next:"adolescentie_naomi_beschermd", stress:0, det:{protective:["therapy","continuity"]} },
      ]
    },
    { id:"adolescentie_naomi", phase:"Adolescentie", age:"15 jaar", text:`De puberteit maakt alles heftiger. Oude angsten komen terug in een nieuw jasje: wantrouwen in relaties, het gevoel dat iedereen je uiteindelijk verlaat, intense emoties die je niet kunt reguleren. Je begint te snijden — het stopt de paniek. Je eerste vriendje is agressief. Je herkent het patroon niet — het voelt als normaal. Het voelt als thuis.`, determinants:{risk:["ace","hertrauma"],protective:[]},
      choices:[
        { text:"Een vriendin ziet de snijwonden en sleept je mee naar de huisarts", next:"huisarts_naomi", stress:0, det:{protective:["support","gp"]} },
        { text:"Niemand ziet het — je draagt lange mouwen", next:"adolescentie_naomi_zwaar", stress:2, det:{risk:["isolation"]} },
        { text:"Een vertrouwensdocent op school merkt het op", next:"school_steun_naomi", stress:0, det:{protective:["school","mentor"]} },
      ]
    },
    { id:"adolescentie_naomi_zwaar", phase:"Ontsporing", age:"16 jaar", text:`Je bent 16. Je snijdt dagelijks. Je drinkt. Je loopt weg uit de instelling. Je hebt seks met mannen die je nauwelijks kent. Je bent woedend — op iedereen en alles. De instelling meldt je als 'weggelopen minderjarige'. De politie brengt je terug. In het dossier staat: "Gedragsstoornis, oppositioneel-opstandig, persoonlijkheidsproblematiek in ontwikkeling."`, determinants:{risk:["substance","police","hertrauma","misdiagnosis"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — GEDRAG ALS LABEL: De gedragingen worden beschreven als het probleem, niet als symptoom van onderliggend trauma. De diagnose 'gedragsprobleem' verdringt de traumageschiedenis.`,
      choices:[
        { text:"Een nieuwe behandelaar kijkt voorbij het gedrag en ziet het trauma", next:"trauma_laat_naomi", stress:0, det:{protective:["earlydetect","therapy"]} },
        { text:"Je wordt 18 en het systeem laat je gaan", next:"18_naomi", stress:3, det:{risk:["transition","noafterzorg"]} },
      ]
    },
    { id:"adolescentie_naomi_beschermd", phase:"Adolescentie (beschermd)", age:"16 jaar", text:`De puberteit is moeilijk, maar je hebt tools. De traumatherapie heeft de ergste angsten verminderd. Je hebt een pleeg- of gezinshuis dat stabiel is. Je gaat naar school. Soms gaat het mis — een flashback in de klas, een woedeaanval thuis. Maar er zijn mensen die snappen wat er gebeurt en niet weglopen.`, determinants:{risk:["residual"],protective:["therapy","attachment","continuity","support"]},
      choices:[
        { text:"De overgang naar 18 wordt voorbereid: geleidelijk, met overlap", next:"18_met_plan_naomi", stress:0, det:{protective:["continuity"]} },
        { text:"Op je 18e stopt alles toch", next:"18_naomi_zachte_landing", stress:1, det:{risk:["transition"]} },
      ]
    },
    { id:"huisarts_naomi", phase:"De huisarts", age:"16 jaar", text:`De huisarts bekijkt je armen. "Hoe lang al?" Ze is niet geschokt, niet veroordelend. Ze vraagt: "Wil je me vertellen wat er aan de hand is?" Voor het eerst vertel je een volwassene in het systeem over de nachtmerries, de paniek, het snijden. De huisarts verwijst naar de jeugd-ggz voor traumabehandeling.`, determinants:{risk:[],protective:["gp","earlydetect"]},
      choices:[
        { text:"De wachtlijst is zes maanden — maar de huisarts ziet je elke twee weken", next:"trauma_laat_naomi", stress:1, det:{protective:["gp","continuity"],risk:["wait"]} },
        { text:"De wachtlijst is zes maanden en de huisarts heeft geen tijd", next:"adolescentie_naomi_zwaar", stress:2, det:{risk:["wait"]} },
      ]
    },
    { id:"trauma_laat_naomi", phase:"Traumabehandeling (laat)", age:"17 jaar", text:`De therapie start laat — maar start. De therapeut combineert verschillende vormen van behandeling. Het is intens. Er zijn weken dat het slechter gaat voordat het beter gaat. Maar de therapeut zegt: "Dat is normaal. Je lichaam laat los wat het jaren heeft vastgehouden."`, determinants:{risk:[],protective:["therapy"]},
      choices:[

      ]
    },
    { id:"18_naomi", phase:"Achttien", age:"18 jaar", text:`Op je 18e verjaardag verlies je alles. De jeugdzorg stopt. De instelling zet je op straat — formeel met 'begeleid wonen', in de praktijk een kamer in een flat met minimale begeleiding. De jeugd-ggz draagt je dossier over aan de volwassenen-ggz. De nieuwe behandelaar kent je niet. Je moet je hele verhaal opnieuw vertellen. Je weigert. Je hebt het al aan twintig mensen verteld.`, determinants:{risk:["transition","noafterzorg","fragmentation","housing"],protective:[]}, systemText:`⚠️ SYSTEEMMOMENT — TRANSITYIEBREUK 18 JAAR: Voor jongeren met een jeugdzorgverleden is de 18e verjaardag het meest destructieve systeemmoment. Alle relaties, voorzieningen en bescherming verdwijnen op een willekeurig kalendermoment.`,

    { id:"18_met_plan_naomi", phase:"Zachte overgang", age:"19 jaar", text:`Met een 18+-regeling of een warme overdracht heb je nog begeleiding. De transitie is niet pijnloos — je verliest nog steeds bekende gezichten. Maar er is een plan. Er is een woning. Er is een behandelaar die je dossier heeft gelezen en die vraagt: "Wat heb jij nodig?" in plaats van "Wat is er met je aan de hand?"`, determinants:{risk:[],protective:["continuity","housing_stable","therapy"]},
      choices:[

      ]
    },
    { id:"18_naomi_zachte_landing", phase:"Overgang", age:"19 jaar", text:`De overgang is niet soepel, maar ook niet catastrofaal. Je verliest de jeugd-ggz-therapeut maar de volwassenen-ggz heeft je intake al gedaan voor je 18e. Er is een gat van zes weken — niet ideaal, maar je huisarts overbrugt het.`, determinants:{risk:["transition"],protective:["gp","continuity"]},
      choices:[

    },
    { id:"straat_naomi", phase:"Op straat", age:"19 jaar", text:`Je bent 19 en dakloos. De begeleide-wonen-kamer heb je verloren na een conflict met de buurman. De bijstandsaanvraag is afgewezen vanwege een administratief probleem. Je slaapt bij wisselende bekenden. Soms in de opvang — als er plek is. Het snijden is terug. Op een avond gaat het te ver. De ambulance komt.`, determinants:{risk:["housing","isolation","noafterzorg"],protective:[]},
      choices:[
        { text:"Op de SEH komt een psychiatrisch verpleegkundige die de tijd neemt", next:"seh_naomi_goed", stress:1, det:{protective:["earlydetect","therapy"]} },

    { id:"seh_naomi_goed", phase:"De SEH", age:"19 jaar", text:`De verpleegkundige heet Sanne. Ze zit naast je bed en zegt: "Ik ga je niet vragen wat er met je aan de hand is. Ik ga je vragen wat er met je is gebeurd." Die ene zin verandert alles. Voor het eerst voelt het alsof iemand snapt dat jouw gedrag een reactie is, geen keuze.`, determinants:{risk:[],protective:["earlydetect","mentor"]},

    { id:"terugval_naomi_beschermd", phase:"Terugval (beschermd)", age:"21 jaar", text:`Een trigger — het gezicht van een man op straat die lijkt op je stiefvader — gooit je terug. De paniek, het snijden, de dissociatie. Maar dit keer bel je je behandelaar. Die schakelt crisisondersteuning in. Binnen 24 uur is er hulp. De terugval duurt twee weken in plaats van twee maanden.`, determinants:{risk:["residual"],protective:["crisis_plan","continuity","therapy"]}, systemText:`✅ BESCHERMEND MOMENT: Het verschil tussen een terugval mét en zonder behandelrelatie. Dezelfde trigger, radicaal andere uitkomst.`,

    // === ENDINGS NAOMI ===
    { id:"einde_naomi_goed", phase:"Herstellen", age:"24 jaar", text:`Je bent 24. Je hebt een eigen woning, een parttime baan, en een therapeut die je vertrouwt. De littekens op je armen vertellen een verhaal dat je liever niet had gehad. Maar je leeft. Je hebt geleerd dat je reacties op wat je is overkomen normaal waren — het waren overlevingsstrategieën. Nu leer je nieuwe strategieën, voor een leven dat veiliger is dan je kindertijd. Je denkt vaak: wat als Karin en Frank niet hadden volgehouden? Wat als Lisa niet was gebleven? Wat als de traumabehandeling op mijn twaalfde was begonnen in plaats van op mijn zeventiende?`, isEnding:true, endingType:"good", determinants:{risk:[],protective:[]} },
    { id:"einde_naomi_gemengd", phase:"Beter laat", age:"24 jaar", text:`Je bent 24 en je staat aan het begin van herstel. De traumabehandeling die op je vijfde had moeten beginnen, start nu pas echt. Twintig jaar verloren aan een systeem dat je gedrag bestrafte in plaats van je pijn te behandelen. Maar je bent er nog. En er is iemand die de juiste vraag stelde: niet "Wat is er mis met je?" maar "Wat is je overkomen?"`, isEnding:true, endingType:"mixed", determinants:{risk:[],protective:[]} },
    { id:"einde_naomi_vastgelopen", phase:"Tussenwal en schip", age:"24 jaar", text:`Je bent 24. Geen woning, geen behandeling, geen toekomstperspectief. Het systeem noemt je 'multi-problematiek'. In de Levensloopaanpak sta je als 'hoog risico'. Er wordt over je vergaderd. De diagnoses in je dossier: een reeks diagnoses en labels. Niemand leest het verhaal achter de diagnoses. Niemand vraagt meer wat er is gebeurd. Je bent het systeem. Het systeem is jou.`, isEnding:true, endingType:"stuck", determinants:{risk:[],protective:[]} },

// ─── COMPONENTS ─────────────────────────────────────────────

function StressMeter({ value, max = 25, color }) {
  const pct = Math.min((value / max) * 100, 100);
  const c = pct < 30 ? "#4a9e6b" : pct < 55 ? "#d4a033" : pct < 80 ? "#d4644a" : "#c44b4b";
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#999", marginBottom: 3, fontFamily: "var(--mono)" }}>
        <span>SYSTEEMDRUK</span><span>{Math.round(pct)}%</span>
      </div>
      <div style={{ height: 3, background: "#E0E0E0", borderRadius: 2 }}>
        <div style={{ height: "100%", width: `${pct}%`, background: c, borderRadius: 2, transition: "width 0.8s, background 0.8s" }} />
      </div>
    </div>
  );
}

function DeterminantTracker({ activated }) {
  const riskKeys = Object.keys(activated.risk || {}).filter(k => activated.risk[k]);
  const protKeys = Object.keys(activated.protective || {}).filter(k => activated.protective[k]);
  if (riskKeys.length === 0 && protKeys.length === 0) return null;
  return (
    <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 12 }}>
      <div style={{ flex: 1, minWidth: 140 }}>
        <div style={{ fontSize: 9, color: "#B03030", fontFamily: "var(--mono)", letterSpacing: 2, marginBottom: 4 }}>LUXERENDE FACTOREN ({riskKeys.length})</div>
        {riskKeys.map(k => (
          <div key={k} style={{ fontSize: 11, color: "#555", fontFamily: "var(--mono)", padding: "1px 0" }}>
            <span style={{ color: "#c44b4b" }}>◆</span> {DETERMINANTS.risk[k]?.label || k}
          </div>
        ))}
      </div>
      <div style={{ flex: 1, minWidth: 140 }}>
        <div style={{ fontSize: 9, color: "#1B7A3D", fontFamily: "var(--mono)", letterSpacing: 2, marginBottom: 4 }}>BESCHERMENDE FACTOREN ({protKeys.length})</div>
        {protKeys.map(k => (
          <div key={k} style={{ fontSize: 11, color: "#555", fontFamily: "var(--mono)", padding: "1px 0" }}>
            <span style={{ color: "#4a9e6b" }}>●</span> {DETERMINANTS.protective[k]?.label || k}
          </div>
        ))}
      </div>
    </div>
  );
}

function TypeWriter({ text, speed = 14, onDone }) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  const idx = useRef(0);
  const cancelled = useRef(false);

  useEffect(() => {
    setDisplayed(""); idx.current = 0; setDone(false); cancelled.current = false;
  }, [text]);

  useEffect(() => {
    if (done || cancelled.current) return;
    if (idx.current < text.length) {
      const timer = setTimeout(() => {
        if (cancelled.current) return;
        idx.current++;
        setDisplayed(text.slice(0, idx.current));
        if (idx.current >= text.length) { setDone(true); onDone?.(); }
      }, speed);
      return () => clearTimeout(timer);
    }
  }, [displayed, text, speed, onDone, done]);

  const skip = () => { cancelled.current = true; setDisplayed(text); setDone(true); onDone?.(); };

  return (
    <span onClick={skip} style={{ cursor: done ? "default" : "pointer" }}>
      {displayed}
      {!done && <span style={{ opacity: 0.25, animation: "blink 1s infinite" }}>▌</span>}
    </span>
  );
}

function Game({ persona, onBack }) {

  const [activatedDets, setActivatedDets] = useState({ risk: {}, protective: {} });
  const [showChoices, setShowChoices] = useState(false);
  const [showSystem, setShowSystem] = useState(false);

  const ref = useRef(null);

  const story = STORIES[persona.id] || [];
  const node = story.find(n => n.id === nodeId);

  useEffect(() => {
    setShowChoices(false); setShowSystem(false);
    ref.current?.scrollTo({ top: 0, behavior: "smooth" });
  }, [nodeId]);

  // activate determinants from node itself
  useEffect(() => {
    if (!node) return;
    const nd = node.determinants || { risk: [], protective: [] };
    setActivatedDets(prev => {
      const next = { risk: { ...prev.risk }, protective: { ...prev.protective } };
      (nd.risk || []).forEach(k => { next.risk[k] = true; });
      (nd.protective || []).forEach(k => { next.protective[k] = true; });
      return next;
    });

  const handleChoice = useCallback((choice) => {
    setHistory(h => [...h, { nodeId, choice: choice.text }]);
    setStress(s => s + (choice.stress || 0));

    if (choice.det) {
      setActivatedDets(prev => {
        const next = { risk: { ...prev.risk }, protective: { ...prev.protective } };
        (choice.det.risk || []).forEach(k => { next.risk[k] = true; });
        (choice.det.protective || []).forEach(k => { next.protective[k] = true; });
        return next;
      });
    }
    setNodeId(choice.next);
  }, [nodeId]);

  if (!node) return <div style={{ color: "#fff", padding: 40 }}>Verhaal niet gevonden.</div>;

  const riskCount = Object.values(activatedDets.risk).filter(Boolean).length;
  const protCount = Object.values(activatedDets.protective).filter(Boolean).length;

    <div style={{ "--mono": "'DM Mono', monospace", "--serif": "'Source Serif 4', Georgia, serif", minHeight: "100vh", background: persona.bg, color: "#1a1a1a", display: "flex", flexDirection: "column", fontFamily: "var(--serif)" }}>

        {node.age && <span style={{ fontSize: 10, color: "#999" }}>{node.age}</span>}
      </div>

      {/* Meters */}
      <div style={{ padding: "10px 16px 0", flexShrink: 0 }}>
        <StressMeter value={stress} color={persona.color} />
        <DeterminantTracker activated={activatedDets} />

        <div style={{ fontSize: 10, color: persona.color, fontFamily: "var(--mono)", letterSpacing: 3, marginBottom: 6, textTransform: "uppercase" }}>{node.phase}</div>

              {node.endingType === "good" ? "HERSTEL" : node.endingType === "mixed" ? "GEMENGD EINDE" : "VASTGELOPEN"}
            </div>
            <div style={{ fontSize: 13, lineHeight: 1.65, color: "#555", marginBottom: 20, fontFamily: "var(--mono)" }}>
              {node.endingType === "good"
                ? "Dit is de beste uitkomst — en zelfs hier zijn er jaren verloren gegaan. De beschermende factoren die het verschil maakten, waren niet vanzelfsprekend. Ze hadden er ook niet kunnen zijn."
                : node.endingType === "mixed"
                ? "Een begin van herstel, maar met onherstelbare schade. Elke wachtlijst, elke systeembreuk, elke verkeerde diagnose heeft iets gekost dat niet terugkomt."
                : "Vastgelopen. Niet door individueel falen, maar door systeemfalen. De systeemspiralen — de draaideur, de wachtlijst, de uitsluiting — zijn sterker dan individuele veerkracht."}
            </div>

            {/* Determinant summary */}
            <div style={{ background: "#F0F0F0", padding: 14, borderRadius: 3, marginBottom: 16, fontFamily: "var(--mono)", fontSize: 11 }}>
              <div style={{ marginBottom: 8, color: "#777" }}>JOUW LEVENSLOOP IN DETERMINANTEN</div>
              <div style={{ display: "flex", gap: 20 }}>
                <div>
                  <span style={{ color: "#B03030" }}>◆ {riskCount} luxerend</span>
                  <div style={{ fontSize: 10, color: "#999", marginTop: 4 }}>
                    {Object.keys(activatedDets.risk).filter(k => activatedDets.risk[k]).map(k => DETERMINANTS.risk[k]?.label || k).join(", ") || "—"}
                  </div>
                </div>
                <div>
                  <span style={{ color: "#1B7A3D" }}>● {protCount} beschermend</span>
                  <div style={{ fontSize: 10, color: "#999", marginTop: 4 }}>
                    {Object.keys(activatedDets.protective).filter(k => activatedDets.protective[k]).map(k => DETERMINANTS.protective[k]?.label || k).join(", ") || "—"}
                  </div>
                </div>
              </div>
              <div style={{ marginTop: 10, color: "#888", fontSize: 10 }}>
                Systeemdruk: {Math.round((stress / 25) * 100)}% · Keuzes: {history.length} · Leeftijd bereikt: {node.age || "—"}
              </div>
            </div>

            {/* ═══ HEFBOOMANALYSE ═══ */}
            <div style={{ marginTop: 24, marginBottom: 24 }}>
              <div style={{ fontSize: 10, color: persona.color, fontFamily: "var(--mono)", letterSpacing: 3, marginBottom: 16, textTransform: "uppercase" }}>
                ⚖ Hefboomanalyse — Wat had het verschil gemaakt?
              </div>
              <div style={{ fontSize: 12, lineHeight: 1.6, color: "#555", fontFamily: "var(--serif)", marginBottom: 16 }}>
                Onderstaande interventies hadden op specifieke momenten in {persona.name}'s leven het verloop fundamenteel kunnen veranderen. De hefbomen zijn geordend op leeftijd — hoe eerder de interventie, hoe groter het effect.
              </div>

              {(LEVERAGE_POINTS[persona.id] || []).map((lp, i) => {
                const wasActivated = activatedDets.protective[lp.protKey];
                const riskWasPresent = activatedDets.risk[lp.riskKey];
                return (
                  <div key={lp.id} style={{
                    background: wasActivated ? "rgba(27,122,61,0.04)" : "rgba(176,48,48,0.03)",
                    border: `1px solid ${wasActivated ? "#B0D8C0" : "#E8C0C0"}`,
                    borderRadius: 4, padding: 14, marginBottom: 10,
                  }}>
                    {/* Header */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                      <span style={{
                        fontSize: 9, fontFamily: "var(--mono)", padding: "2px 6px", borderRadius: 2, letterSpacing: 1,
                        background: wasActivated ? "#1B7A3D" : "#D0D0D0",
                        color: wasActivated ? "#fff" : "#777",
                      }}>
                        {lp.age}
                      </span>
                      <span style={{ fontSize: 13, fontFamily: "var(--serif)", fontWeight: 600, color: wasActivated ? "#1B7A3D" : "#333" }}>
                        {lp.title}
                      </span>
                      {wasActivated && <span style={{ fontSize: 9, color: "#1B7A3D", fontFamily: "var(--mono)" }}>✓ GEACTIVEERD</span>}
                      {!wasActivated && riskWasPresent && <span style={{ fontSize: 9, color: "#B03030", fontFamily: "var(--mono)" }}>✗ GEMIST</span>}
                    </div>

                    {/* Description */}
                    <div style={{ fontSize: 12, lineHeight: 1.6, color: "#555", fontFamily: "var(--serif)", marginBottom: 10 }}>
                      {lp.desc}
                    </div>

                    {/* Cost comparison */}
                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 8 }}>
                      <div style={{ flex: 1, minWidth: 120, background: "#F5F5F5", padding: 8, borderRadius: 3 }}>
                        <div style={{ fontSize: 9, color: "#1B7A3D", fontFamily: "var(--mono)", letterSpacing: 1, marginBottom: 3 }}>INVESTERING</div>
                        <div style={{ fontSize: 11, color: "#555", fontFamily: "var(--mono)" }}>{lp.cost}</div>
                      </div>
                      <div style={{ flex: 1, minWidth: 120, background: "#F5F5F5", padding: 8, borderRadius: 3 }}>
                        <div style={{ fontSize: 9, color: "#B03030", fontFamily: "var(--mono)", letterSpacing: 1, marginBottom: 3 }}>VOORKOMEN KOSTEN</div>
                        <div style={{ fontSize: 11, color: "#555", fontFamily: "var(--mono)" }}>{lp.avoided}</div>
                      </div>
                    </div>


                    {/* Systeemeffect */}
                    <div style={{ marginTop: 6, fontSize: 10, color: "#888", fontFamily: "var(--mono)", fontStyle: "italic" }}>
                      {lp.cld}
                    </div>
                  </div>
                );
              })}
            </div>



            <button onClick={onBack} style={{ background: persona.color, color: "#fff", border: "none", padding: "12px 20px", borderRadius: 3, cursor: "pointer", fontSize: 12, fontFamily: "var(--mono)", letterSpacing: 1, width: "100%", marginBottom: 8 }}>
              SPEEL EEN ANDER VERHAAL
            </button>
            <button onClick={() => { setNodeId("start"); setStress(0); setHistory([]); setActivatedDets({risk:{},protective:{}}); }} style={{ background: "transparent", color: "#777", border: "1px solid #D0D0D0", padding: "12px 20px", borderRadius: 3, cursor: "pointer", fontSize: 12, fontFamily: "var(--mono)", letterSpacing: 1, width: "100%" }}>
              HERSPEEL DIT VERHAAL — MAAK ANDERE KEUZES
            </button>
          </div>
        )}
      </div>


    </div>
  );
}

// ─── START SCREEN ───────────────────────────────────────────

function App() {
  const [selected, setSelected] = useState(null);
  if (selected) return <Game persona={selected} onBack={() => setSelected(null)} />;

  return (
    <div style={{ minHeight: "100vh", background: "#FAFAFA", color: "#1a1a1a", fontFamily: "'DM Mono', monospace" }}>
      <div style={{ maxWidth: 580, margin: "0 auto", padding: "36px 18px" }}>
        <h1 style={{ fontSize: 28, fontWeight: 300, letterSpacing: 2, color: "#1B213E", margin: 0, fontFamily: "'Source Serif 4', Georgia, serif" }}>Een gelijke kans om te herstellen</h1>
        <p style={{ fontSize: 11, color: "#777", letterSpacing: 3, marginTop: 6, textTransform: "uppercase" }}>Een serious game over een levensloop in de systemen van de geestelijke gezondheidszorg</p>
        <p style={{ marginTop: 20, fontSize: 14, lineHeight: 1.7, color: "#444", fontFamily: "'Source Serif 4', Georgia, serif", maxWidth: 460 }}>
          Vijf levens. Vijf verhalen. Eén systeem. Maak keuzes vanuit het eerste persoon — en ervaar hoe beschermende factoren het verschil maken tussen herstel en vastlopen. Waar je wieg staat, wie er om je heen staat, en hoe het systeem reageert: het bepaalt of je een gelijke kans krijgt.
        </p>
        <p style={{ fontSize: 10, color: "#888", lineHeight: 1.6, marginTop: 8 }}>
          Klik op de tekst om het typen te versnellen. De gekleurde labels onder de keuzes tonen welke determinanten worden geactiveerd.
        </p>

        <div style={{ marginTop: 32, display: "flex", flexDirection: "column", gap: 10 }}>
          {PERSONAS.map(p => (
            <button key={p.id} onClick={() => setSelected(p)} style={{ background: "transparent", border: "1px solid #E0E0E0", borderRadius: 6, padding: "16px 14px", cursor: "pointer", textAlign: "left", display: "flex", gap: 14, alignItems: "flex-start", transition: "all 0.3s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = p.color; e.currentTarget.style.background = `${p.color}06`; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#E0E0E0"; e.currentTarget.style.background = "transparent"; }}>
              <span style={{ fontSize: 24 }}>{p.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 3 }}>
                  <span style={{ fontSize: 17, color: "#1a1a1a", fontFamily: "'Source Serif 4', serif", fontWeight: 600 }}>{p.name}</span>
                  <span style={{ fontSize: 10, color: "#999" }}>{p.age} jaar</span>
                  <span style={{ fontSize: 9, color: p.color, letterSpacing: 1, textTransform: "uppercase" }}>{p.trajectory}</span>
                </div>
                <div style={{ fontSize: 12, color: "#666", fontFamily: "'Source Serif 4', serif", fontStyle: "italic" }}>"{p.tagline}"</div>
              </div>
              <span style={{ color: "#CCC", fontSize: 16, marginTop: 2 }}>→</span>
            </button>
          ))}
        </div>

        <div style={{ marginTop: 40, fontSize: 9, color: "#999", lineHeight: 1.7, borderTop: "1px solid #E8E8E8", paddingTop: 14 }}>
          <strong style={{ color: "#666" }}>Over deze game</strong><br />
          Gebaseerd op wetenschappelijk onderzoek naar levenslooptrajecten bij ernstige psychische aandoeningen en de systeembarrières die herstel belemmeren. De verhalen zijn fictief; de systeemervaringen zijn reëel.
          <br /><br /><em>AI-verantwoording: Bij de totstandkoming van deze game is gebruik gemaakt van generatieve AI als ondersteunend instrument. Alle inhoudelijke keuzes berusten bij de auteur.</em>
          <br /><br />© 2026 Katja van Essen-Berman. Alle rechten voorbehouden.
        </div>
      </div>

    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
